# OpenFab multi-forge standup — PLAIN HTTP, sqlite, no install wizard.
# No Caddy, no TLS, no /etc/hosts edits, no sudo. Friction-free local demo.
#
#   Gitea   → host http://localhost:3000
#   Forgejo → host http://localhost:3001
#
# Both run sqlite and are pre-seeded with INSTALL_LOCK=true so the web install
# wizard is skipped. Registration is disabled. ROOT_URL matches the host port
# so generated clone/PR/API URLs are correct.
#
# NOTE on push: forge_rest.rs::authed_remote() hardcodes an https:// push URL,
# so a real `git push` against these plain-http forges needs an adapter fix or
# a TLS front. The "live" classification + REST connectivity (token, repo, PR
# API) all work over plain http and are what we prove here. See README.md.

name: openfab-forges

services:
  gitea:
    image: gitea/gitea:1.22
    container_name: openfab-gitea
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__DOMAIN: localhost
      GITEA__service__DISABLE_REGISTRATION: "true"
      GITEA__service__REQUIRE_SIGNIN_VIEW: "false"
      GITEA__log__LEVEL: warn
    volumes:
      - gitea-data:/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 40

  forgejo:
    image: codeberg.org/forgejo/forgejo:7.0
    container_name: openfab-forgejo
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__database__PATH: /data/gitea/gitea.db
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__server__ROOT_URL: http://localhost:3001/
      FORGEJO__server__HTTP_PORT: "3000"
      FORGEJO__server__DOMAIN: localhost
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__service__REQUIRE_SIGNIN_VIEW: "false"
      FORGEJO__log__LEVEL: warn
    volumes:
      - forgejo-data:/data
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 40

volumes:
  gitea-data:
  forgejo-data:
